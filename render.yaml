# Render.com deployment configuration
# Deploy your Flask app with original UI to the cloud

services:
  - type: web
    name: scholarmate
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scholarmate-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: scholarmate-db
    databaseName: scholarmate
    user: scholarmate
