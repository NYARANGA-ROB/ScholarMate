version: '3.8'
services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: scholarmate_db
    environment:
      POSTGRES_DB: scholarmate
      POSTGRES_USER: scholarmate_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarmate_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholarmate_network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: scholarmate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholarmate_network

  # Flask Application
  web:
    build: .
    container_name: scholarmate_web
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://scholarmate_user:${DB_PASSWORD:-changeme123}@db:5432/scholarmate
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - scholarmate_network
    restart: unless-stopped

  # Celery Worker for background tasks
  celery_worker:
    build: .
    container_name: scholarmate_celery
    command: celery -A celery_worker.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://scholarmate_user:${DB_PASSWORD:-changeme123}@db:5432/scholarmate
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - scholarmate_network
    restart: unless-stopped

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: scholarmate_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - scholarmate_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  scholarmate_network:
    driver: bridge
